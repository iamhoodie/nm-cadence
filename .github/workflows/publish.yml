name: publish

on:
  push:
    tags:
      - "app-v*"
  workflow_dispatch:

jobs:
  publish-tauri:
    name: Release ${{ matrix.label }}
    permissions:
      contents: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS Apple Silicon (M1-M4)
            platform: macos-latest
            target: aarch64-apple-darwin
          - label: macOS Intel
            platform: macos-latest
            target: x86_64-apple-darwin
          - label: Windows x64
            platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    env:
      CADENCE_UPDATER_ENDPOINT: ${{ vars.CADENCE_UPDATER_ENDPOINT }}
      CADENCE_UPDATER_PUBKEY: ${{ vars.CADENCE_UPDATER_PUBKEY }}
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend deps
        run: npm install

      - name: Build and upload release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: app-v__VERSION__
          releaseName: "SideEye v__VERSION__"
          releaseBody: "New installs now default the vault to Application Support instead of Documents, fixing the permission prompt that appeared after every update. Also includes a calendar view, cleaner task modal, conversation scroll fix, done tasks shown as strikethrough in calendar, sidebar groups remember collapsed state, and automatic update checks every 4 hours."
          releaseDraft: false
          prerelease: false
          args: --target ${{ matrix.target }}
          includeUpdaterJson: true
